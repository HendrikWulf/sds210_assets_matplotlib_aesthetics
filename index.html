<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matplotlib Aesthetics Explorer</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; padding: 15px; background: #f8f9fa; color: #333; overflow-x: hidden; }
        .container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1000px; margin: 0 auto; align-items: stretch; }
        
        .controls-area { flex: 1; min-width: 250px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; gap: 12px; }
        .chart-area { flex: 2; min-width: 400px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        
        h3 { margin-top: 0; margin-bottom: 15px; font-size: 1.1em; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 5px; }
        
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        label { font-size: 0.85em; font-weight: bold; color: #475569; }
        select, input[type="range"] { padding: 6px; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 0.9em; width: 100%; box-sizing: border-box; }
        select { background-color: #f8fafc; cursor: pointer; }
        
        /* SVG Chart Styling */
        svg { width: 100%; height: auto; max-height: 350px; display: block; margin: 0 auto; background: white; border: 1px solid #e2e8f0; border-radius: 4px; }
        .grid-line { stroke: #cbd5e1; transition: all 0.2s; }
        .axis-line { stroke: #333; stroke-width: 1.5; }
        .data-line { fill: none; transition: all 0.2s; }
        .marker { transition: all 0.2s; }
        .text-label { fill: #475569; transition: all 0.2s; font-family: sans-serif; }
        
        /* Code Box */
        .code-box { margin-top: 15px; background: #1e293b; color: #f8fafc; padding: 15px; border-radius: 6px; font-family: "Courier New", Courier, monospace; font-size: 0.85em; overflow-x: auto; line-height: 1.4; }
        .code-keyword { color: #f286c4; }
        .code-string { color: #a5d6ff; }
        .code-comment { color: #8b949e; }

        @media (max-width: 768px) {
            .container { flex-direction: column; }
            .chart-area { min-width: 100%; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="controls-area">
        <h3>Plot Controls</h3>
        
        <div class="control-group">
            <label>Week 1 Color</label>
            <select id="ctrl-c1">
                <option value="red">Red</option>
                <option value="green">Green</option>
                <option value="orange">Orange</option>
            </select>
        </div>
        <div class="control-group">
            <label>Week 1 Marker</label>
            <select id="ctrl-m1">
                <option value="o">Circle (o)</option>
                <option value="s">Square (s)</option>
                <option value="None">None</option>
            </select>
        </div>
        <div class="control-group" style="margin-top: 5px;">
            <label>Week 2 Color</label>
            <select id="ctrl-c2">
                <option value="blue">Blue</option>
                <option value="purple">Purple</option>
                <option value="black">Black</option>
            </select>
        </div>
        <div class="control-group">
            <label>Week 2 Marker</label>
            <select id="ctrl-m2">
                <option value="v">Triangle (v)</option>
                <option value="D">Diamond (D)</option>
                <option value="None">None</option>
            </select>
        </div>
        <div class="control-group" style="margin-top: 5px;">
            <label>Line Style</label>
            <select id="ctrl-ls">
                <option value="-">Solid (-)</option>
                <option value="--">Dashed (--)</option>
                <option value=":">Dotted (:)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Legend Location</label>
            <select id="ctrl-loc">
                <option value="upper left">Upper Left</option>
                <option value="upper right">Upper Right</option>
                <option value="lower left">Lower Left</option>
                <option value="lower right">Lower Right</option>
            </select>
        </div>
        <div class="control-group" style="margin-top: 5px;">
            <label>Font Size: <span id="val-fs">12</span></label>
            <input type="range" id="ctrl-fs" min="10" max="18" step="1" value="12">
        </div>
        <div class="control-group">
            <label>Grid Alpha: <span id="val-alpha">0.6</span></label>
            <input type="range" id="ctrl-alpha" min="0.0" max="1.0" step="0.2" value="0.6">
        </div>
    </div>

    <div class="chart-area">
        <svg id="plot-svg" viewBox="0 0 600 350" xmlns="http://www.w3.org/2000/svg">
            </svg>

        <div class="code-box" id="code-output">
            </div>
    </div>
</div>

<script>
    // Data
    const days = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const week1 = [3.3, 4.7, 5.2, 11.6, 14.1, 15.8, 17.4];
    const week2 = [15.9, 11.3, 12.8, 13.4, 13.7, 10.2, 8.6];

    // Mappings for SVG rendering
    const colorMap = { "red": "#ef4444", "green": "#22c55e", "orange": "#f97316", "blue": "#3b82f6", "purple": "#a855f7", "black": "#334155" };
    const dashMap = { "-": "none", "--": "8,8", ":": "3,4" };
    
    // UI Elements
    const els = {
        c1: document.getElementById('ctrl-c1'),
        m1: document.getElementById('ctrl-m1'),
        c2: document.getElementById('ctrl-c2'),
        m2: document.getElementById('ctrl-m2'),
        ls: document.getElementById('ctrl-ls'),
        loc: document.getElementById('ctrl-loc'),
        fs: document.getElementById('ctrl-fs'),
        alpha: document.getElementById('ctrl-alpha'),
        svg: document.getElementById('plot-svg'),
        code: document.getElementById('code-output')
    };

    function drawChart() {
        const state = {
            c1: els.c1.value, m1: els.m1.value, c2: els.c2.value, m2: els.m2.value,
            ls: els.ls.value, loc: els.loc.value, fs: parseInt(els.fs.value), alpha: parseFloat(els.alpha.value)
        };

        // Update Labels
        document.getElementById('val-fs').innerText = state.fs;
        document.getElementById('val-alpha').innerText = state.alpha.toFixed(1);

        // Chart Dimensions
        const width = 600, height = 350;
        const margin = { top: 40, right: 30, bottom: 50, left: 60 };
        const innerW = width - margin.left - margin.right;
        const innerH = height - margin.top - margin.bottom;

        // Math mapping
        const getX = (i) => margin.left + (i * (innerW / (days.length - 1)));
        const getY = (val) => margin.top + innerH - ((val / 20) * innerH); // Max Y is 20

        let svgContent = '';

        // 1. Draw Grid
        const gridDash = dashMap[state.ls];
        for (let i = 0; i <= 4; i++) {
            const y = getY(i * 5);
            svgContent += `<line x1="${margin.left}" y1="${y}" x2="${width - margin.right}" y2="${y}" class="grid-line" stroke-opacity="${state.alpha}" stroke-dasharray="${gridDash}" />`;
        }
        for (let i = 0; i < days.length; i++) {
            const x = getX(i);
            svgContent += `<line x1="${x}" y1="${margin.top}" x2="${x}" y2="${height - margin.bottom}" class="grid-line" stroke-opacity="${state.alpha}" stroke-dasharray="${gridDash}" />`;
        }

        // 2. Draw Axes
        svgContent += `<line x1="${margin.left}" y1="${height - margin.bottom}" x2="${width - margin.right}" y2="${height - margin.bottom}" class="axis-line" />`;
        svgContent += `<line x1="${margin.left}" y1="${margin.top}" x2="${margin.left}" y2="${height - margin.bottom}" class="axis-line" />`;

        // 3. Draw Labels (Dynamic Font Size)
        svgContent += `<text x="${width/2}" y="${margin.top - 15}" text-anchor="middle" class="text-label" font-weight="bold" font-size="${state.fs + 4}">Spring Temperature Variations</text>`;
        svgContent += `<text x="${width/2}" y="${height - 10}" text-anchor="middle" class="text-label" font-size="${state.fs}">Day of the Week</text>`;
        svgContent += `<text x="${margin.left - 40}" y="${margin.top + innerH/2}" transform="rotate(-90 ${margin.left - 40} ${margin.top + innerH/2})" text-anchor="middle" class="text-label" font-size="${state.fs}">Temperature (°C)</text>`;

        // Ticks
        for (let i = 0; i <= 4; i++) {
            svgContent += `<text x="${margin.left - 10}" y="${getY(i * 5) + 4}" text-anchor="end" class="text-label" font-size="${Math.max(10, state.fs - 2)}">${i * 5}</text>`;
        }
        for (let i = 0; i < days.length; i++) {
            svgContent += `<text x="${getX(i)}" y="${height - margin.bottom + 20}" text-anchor="middle" class="text-label" font-size="${Math.max(10, state.fs - 2)}">${days[i]}</text>`;
        }

        // 4. Draw Lines
        const drawLine = (data, colorStr) => {
            const color = colorMap[colorStr];
            let path = `M ${getX(0)} ${getY(data[0])}`;
            for(let i=1; i<data.length; i++) path += ` L ${getX(i)} ${getY(data[i])}`;
            return `<path d="${path}" class="data-line" stroke="${color}" stroke-width="2.5" stroke-dasharray="${gridDash}" />`;
        };
        svgContent += drawLine(week1, state.c1);
        svgContent += drawLine(week2, state.c2);

        // 5. Draw Markers
        const drawMarkers = (data, colorStr, shape) => {
            if (shape === "None") return '';
            const color = colorMap[colorStr];
            let html = '';
            data.forEach((val, i) => {
                const cx = getX(i), cy = getY(val);
                if (shape === "o") html += `<circle cx="${cx}" cy="${cy}" r="5" fill="${color}" class="marker" />`;
                if (shape === "s") html += `<rect x="${cx-4.5}" y="${cy-4.5}" width="9" height="9" fill="${color}" class="marker" />`;
                if (shape === "v") html += `<polygon points="${cx},${cy+5} ${cx-5},${cy-5} ${cx+5},${cy-5}" fill="${color}" class="marker" />`;
                if (shape === "D") html += `<polygon points="${cx},${cy-6} ${cx+5},${cy} ${cx},${cy+6} ${cx-5},${cy}" fill="${color}" class="marker" />`;
            });
            return html;
        };
        svgContent += drawMarkers(week1, state.c1, state.m1);
        svgContent += drawMarkers(week2, state.c2, state.m2);

        // 6. Draw Legend
        let legX, legY;
        if(state.loc === "upper right") { legX = width - margin.right - 90; legY = margin.top + 10; }
        if(state.loc === "upper left") { legX = margin.left + 10; legY = margin.top + 10; }
        if(state.loc === "lower left") { legX = margin.left + 10; legY = height - margin.bottom - 50; }
        if(state.loc === "lower right") { legX = width - margin.right - 90; legY = height - margin.bottom - 50; }
        
        svgContent += `<rect x="${legX}" y="${legY}" width="80" height="40" fill="white" stroke="#cbd5e1" rx="3" />`;
        // Week 1 Legend Item
        svgContent += `<line x1="${legX+5}" y1="${legY+12}" x2="${legX+20}" y2="${legY+12}" stroke="${colorMap[state.c1]}" stroke-width="2" stroke-dasharray="${gridDash}"/>`;
        svgContent += drawMarkers([((legY+12 - margin.top - innerH) / -innerH) * 20], state.c1, state.m1).replace(getX(0), legX+12.5); // Hacky override of X for marker
        svgContent += `<text x="${legX+25}" y="${legY+16}" font-size="10" class="text-label">Week 1</text>`;
        // Week 2 Legend Item
        svgContent += `<line x1="${legX+5}" y1="${legY+28}" x2="${legX+20}" y2="${legY+28}" stroke="${colorMap[state.c2]}" stroke-width="2" stroke-dasharray="${gridDash}"/>`;
        svgContent += drawMarkers([((legY+28 - margin.top - innerH) / -innerH) * 20], state.c2, state.m2).replace(getX(0), legX+12.5);
        svgContent += `<text x="${legX+25}" y="${legY+32}" font-size="10" class="text-label">Week 2</text>`;

        els.svg.innerHTML = svgContent;

        // 7. Update Code Text
        const codeText = 
`<span class="code-comment"># 6a. Explicitly define line and marker aesthetics</span>
ax.plot(days, temperature_week1, color=<span class="code-string">"${state.c1}"</span>, marker=<span class="code-string">"${state.m1}"</span>, linestyle=<span class="code-string">"${state.ls}"</span>)
ax.plot(days, temperature_week2, color=<span class="code-string">"${state.c2}"</span>, marker=<span class="code-string">"${state.m2}"</span>, linestyle=<span class="code-string">"${state.ls}"</span>)

<span class="code-comment"># 6b. Increase the font size for readability</span>
ax.set_title(<span class="code-string">"Spring Temperature Variations"</span>, fontsize=${state.fs + 4})
ax.set_xlabel(<span class="code-string">"Day of the Week"</span>, fontsize=${state.fs})
ax.set_ylabel(<span class="code-string">"Temperature (°C)"</span>, fontsize=${state.fs})

<span class="code-comment"># 6c. Fine-tune the Legend and Grid</span>
ax.legend([<span class="code-string">"Week 1"</span>, <span class="code-string">"Week 2"</span>], loc=<span class="code-string">"${state.loc}"</span>)
ax.grid(<span class="code-keyword">True</span>, linestyle=<span class="code-string">"${state.ls}"</span>, alpha=${state.alpha.toFixed(1)})`;

        els.code.innerHTML = codeText;
    }

    // Attach Listeners
    Object.values(els).forEach(el => {
        if(el.tagName === 'SELECT' || el.tagName === 'INPUT') {
            el.addEventListener('input', drawChart);
        }
    });

    // Init
    drawChart();
</script>
</body>
</html>
